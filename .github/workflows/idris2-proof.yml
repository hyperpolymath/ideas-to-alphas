# SPDX-License-Identifier: MPL-2.0
# Idris2 proof check — type-checks EVERY Idris2 module in the repository via
# scripts/check-idris2-proofs.sh (the same script `just proof-check-idris2`
# runs, so local green and CI green mean the same thing).
#
# History, because the scope of this gate is the whole point:
#
#   v1 gated a-sounder-constitution/formal/ only. It was created after a proof
#   shipped unchecked and did not compile (#45). It worked -- and the identical
#   bug then walked into the two directories it did not cover. research/'s
#   Modal.idr never compiled from creation until 2026-07-16 (`dup` collided with
#   Prelude.dup), while every status file recorded its comonad laws as proved at
#   100%. Five of the six modules under verification/proofs/idris2/ -- a
#   directory named "proofs" -- still do not compile.
#
#   The lesson was not "gate that file". It was "gate the language". A gate
#   scoped to where the bug last happened only ever prevents the last bug.
#
# Path filters are therefore deliberately broad: any .idr anywhere, the script,
# and this workflow. The script itself fails on any .idr not in its manifest, so
# new proofs cannot be added ungated.
name: Idris2 Proof

on:
  push:
    branches: [main, master]
    paths:
      - '**.idr'
      - 'scripts/check-idris2-proofs.sh'
      - '.github/workflows/idris2-proof.yml'
  pull_request:
    paths:
      - '**.idr'
      - 'scripts/check-idris2-proofs.sh'
      - '.github/workflows/idris2-proof.yml'
  workflow_dispatch:

# Estate guardrail: one run per ref, cancel superseded runs. Read-only check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IDRIS2_VERSION: "0.7.0"

jobs:
  idris2-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Chez Scheme (Idris2 backend)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chezscheme libgmp-dev

      - name: Build & install Idris2 ${{ env.IDRIS2_VERSION }}
        run: |
          set -euo pipefail
          tarball="idris2-${IDRIS2_VERSION}.tar.gz"
          curl -fsSL -o "$tarball" \
            "https://codeload.github.com/idris-lang/Idris2/tar.gz/refs/tags/v${IDRIS2_VERSION}"
          tar xzf "$tarball"
          cd "Idris2-${IDRIS2_VERSION}"
          make bootstrap SCHEME=chezscheme
          make install SCHEME=chezscheme
          echo "${HOME}/.idris2/bin" >> "$GITHUB_PATH"

      - name: Type-check every Idris2 module
        # The script fails if idris2 is missing rather than skipping, so a broken
        # install step can never render as a green proof run.
        run: ./scripts/check-idris2-proofs.sh
